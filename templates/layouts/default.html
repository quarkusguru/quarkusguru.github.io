<!DOCTYPE html>
<html lang="{site.data.lang ?: 'en'}" dir="{site.data.direction ?: 'ltr'}">
<head>
    {#if config:boolean('analytics.enabled')}
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BT1CNR72KH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag()\{dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-BT1CNR72KH');
    </script>
    {/if}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {#seo page site /}
    {#favicon site/}
    {#rss site /}
    <!-- Theme initialization script (prevent flash) -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'light';
        if(theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    {#bundle /}
</head>
<body>
    {#include partials/header.html /}

    <main class="site-main">
        {#insert /}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>Powered by <a href="https://quarkus.guru.github.io" target="_blank">Roq 🗿</a></p>
            <p>&copy; {now.format('Y')} {site.title}. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
